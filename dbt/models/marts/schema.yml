version: 2

models:
  - name: dim_security
    description: "Governed security master with Type 2 effective dating."
    columns:
      - name: security_key
        tests:
          - not_null
          - unique
      - name: cusip
        tests:
          - not_null
      - name: isin
        tests:
          - not_null
      - name: listing_status
        description: "Asset-class-equivalent status per contract (no non-equity in v1)."
        tests:
          - accepted_values:
              values: ['Active', 'Delisted']

  - name: dim_issuer
    description: "Governed issuer master with parent hierarchy."
    columns:
      - name: issuer_key
        tests:
          - not_null
          - unique
      - name: lei
        tests:
          - not_null

  - name: fact_position
    description: "End-of-day account-level holdings."
    columns:
      - name: account_key
        tests:
          - not_null
      - name: security_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_security')
              field: security_key

  - name: fact_transaction
    description: "Executed trades and capital actions."
    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique
      - name: security_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_security')
              field: security_key
      - name: transaction_type
        tests:
          - accepted_values:
              values: ['Buy', 'Sell', 'Dividend', 'Split', 'Spinoff', 'Merger', 'Other']

  - name: fact_benchmark_constituent
    description: "Benchmark membership bridge."
    columns:
      - name: benchmark_key
        tests:
          - not_null
      - name: security_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_security')
              field: security_key
